<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký thành viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .register-container { max-width: 400px; margin-top: 100px; }
    </style>
</head>
<body>
<div class="container register-container">
    <div class="card shadow border-0 p-4">
        <h3 class="text-center mb-4 fw-bold text-primary">ĐĂNG KÝ</h3>
        <form action="/register" method="POST">
            <div class="mb-3">
                <label class="form-label">Họ và tên</label>
                <input type="text" name="ho_ten" class="form-control" placeholder="Nhập họ tên..." required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" name="mat_khau" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">TẠO TÀI KHOẢN</button>
        </form>
        <div class="text-center mt-3">
            <small>Đã có tài khoản? <a href="/login" class="text-decoration-none">Đăng nhập</a></small>
        </div>
    </div>
</div>
</body>
</html>
