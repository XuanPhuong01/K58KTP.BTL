<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Gợi ý sách</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
width:220px;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.price{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<h2 style="text-align:center">📚 Sách gợi ý cho bạn</h2>

<div class="container">

{% for b in books %}

<div class="card">

<h3>{{b.ten_sach}}</h3>

<p>{{b.tac_gia}}</p>

<p class="price">{{b.gia}} VND</p>

<a href="/chitiet/{{b.ma_sach}}">Xem chi tiết</a>

</div>

{% endfor %}

</div>

</body>

</html>
