<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Bán Sách Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            background: #fff;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: #0d6efd;
            font-weight: bold;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h2>Đăng Nhập</h2>
            <p class="text-muted">Chào mừng bạn quay trở lại!</p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2" style="font-size: 0.85rem;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label for="email" class="form-label">Email của bạn</label>
                <input type="email" class="form-control shadow-sm" id="email" name="email" placeholder="name@example.com" required>
            </div>
            
            <div class="mb-4">
                <label for="mat_khau" class="form-label">Mật khẩu</label>
                <input type="password" class="form-control shadow-sm" id="mat_khau" name="mat_khau" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-login">
                Đăng nhập ngay
            </button>
        </form>

        <div class="register-link">
            Bạn chưa có tài khoản? <a href="/register" class="text-decoration-none">Đăng ký ngay</a>
            <br>
            <a href="/" class="text-muted mt-3 d-inline-block">← Quay lại trang chủ</a>
        </div>
    </div>

</body>
</html>
