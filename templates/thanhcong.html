<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt hàng thành công - Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f8f9fa; }
        .success-card {
            max-width: 600px;
            margin: 80px auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .check-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="card success-card p-5">
        <div class="check-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="fw-bold text-dark">Đặt hàng thành công!</h1>
        <p class="text-muted fs-5">Cảm ơn bạn đã mua sắm tại Bookstore. Đơn hàng của bạn đã được tiếp nhận và đang trong quá trình chuẩn bị.</p>
        
        <div class="bg-light p-4 rounded-4 my-4 border">
            <p class="mb-1 text-uppercase small fw-bold text-muted">Mã đơn hàng của bạn</p>
            <h2 class="text-primary fw-bold mb-0">#{{ ma_don }}</h2>
        </div>

        <div class="d-grid gap-2 d-md-block">
            <a href="/" class="btn btn-primary btn-lg px-5 rounded-pill shadow">Tiếp tục mua sắm</a>
        </div>
        
        <p class="mt-4 small text-muted">Chúng tôi đã gửi một email xác nhận kèm chi tiết đơn hàng cho bạn.</p>
    </div>
</div>

</body>
</html>
